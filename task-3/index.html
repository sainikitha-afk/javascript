<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <!-- Gallery -->
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/300" class="thumb">
        <img src="https://picsum.photos/id/1016/300" class="thumb">
        <img src="https://picsum.photos/id/1018/300" class="thumb">
        <img src="https://picsum.photos/id/1020/300" class="thumb">
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <span class="close">&times;</span>
        <img id="modalImg">
    </div>

    <script src="script.js"></script>
</body>
</html>
